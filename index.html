<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exploration Game :3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas" width="1100" height="700"></canvas>

  <div id="ui">
    <div>Health: <span id="health">100</span>/100</div>
    <div>Enemies Killed: <span id="killed">0</span></div>
    <div>W/A/S/D or Arrow Keys move | Click melee | Space shoot | X shockwave | M meteor</div>
  </div>

  <div id="ammo">Arrows: <span id="ammoCount">3</span>/3</div>
  <div id="special">Shockwave: <span id="shockStatus">READY</span></div>
  <div id="meteor">Meteor: <span id="meteorStatus">READY</span></div>

  <div id="bossUi">
    <div>Boss: Giga Slime</div>
    <div class="barWrap"><div id="bossBar" class="barFill"></div></div>
  </div>

  <!-- Name-entry overlay (dismissed once the player clicks Play or after auto-timeout) -->
  <div id="nameOverlay">
    <div id="nameBox">
      <h2>Enter Your Name</h2>
      <input id="nameInput" type="text" maxlength="20" placeholder="Player" autocomplete="off" />
      <button id="nameBtn">Play</button>
      <p id="nameHint">Multiplayer requires the game server to be running.<br>Single-player works without it.</p>
    </div>
  </div>

  <!-- Leaderboard panel (populated by the server in multiplayer; hidden in solo) -->
  <div id="leaderboard">
    <div id="lbTitle">Leaderboard</div>
    <ol id="lbList"></ol>
  </div>

  <script src="game.js"></script>
  <!-- Socket.IO client — served by server/server.js. Loads silently in single-player. -->
  <script src="/socket.io/socket.io.js" onerror="window._socketIoMissing=true"></script>
</body>
</html>
