<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exploration Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #0a0a1a;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 2px solid #fff;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border: 1px solid #fff;
    }
    #ammo {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #ffff00;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border: 2px solid #ffff00;
    }
    #bossHealth {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #ff0000;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border: 1px solid #ff0000;
      display: none;
    }
    #special {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: #66d9ff;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border: 2px solid #66d9ff;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div id="ui">
    <div>Health: <span id="health">100</span>/100</div>
    <div>Enemies Killed: <span id="enemiesKilled">0</span>/15</div>
    <div>W/A/S/D or Arrow Keys to move | Click to melee | Space to shoot | X = Shockwave</div>
  </div>

  <div id="ammo">
    Arrows: <span id="ammoCount">3</span>/3
    <div id="reloadBar" style="display:none; margin-top:5px;">
      Reloading: <span id="reloadPercent">0</span>%
    </div>
  </div>

  <div id="special">
    Shockwave (X): <span id="specialStatus">READY</span>
  </div>

  <div id="bossHealth">
    <div>Boss Health: <span id="bossHealthBar">0</span>/1000</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const TILE_SIZE = 32;
    const WORLD_WIDTH = 2560;
    const WORLD_HEIGHT = 1920;

    const game = {
      player: null,
      enemies: [],
      projectiles: [],
      attacks: [],
      attackIndicators: [],
      footprints: [],
      dust: [],
      shockwaves: [],
      boss: null,
      camera: { x: 0, y: 0 },
      enemySpawnRate: 0.02,
      gameTime: 0,
      enemiesKilled: 0,
      isGameOver: false
    };

    class DustParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = Math.random() * -1;
        this.lifetime = 60;
        this.maxLifetime = 60;
        this.size = 2 + Math.random() * 3;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.lifetime--;
      }
      draw() {
        const alpha = this.lifetime / this.maxLifetime;
        ctx.fillStyle = `rgba(100, 200, 255, ${alpha * 0.6})`;
        ctx.beginPath();
        ctx.arc(this.x - game.camera.x, this.y - game.camera.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Footprint {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.lifetime = 120;
        this.maxLifetime = 120;
      }
      update() {
        this.lifetime--;
      }
      draw() {
        const alpha = this.lifetime / this.maxLifetime;
        ctx.fillStyle = `rgba(50, 100, 150, ${alpha * 0.5})`;
        ctx.beginPath();
        ctx.ellipse(this.x - game.camera.x, this.y - game.camera.y, 8, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class ShockwaveEffect {
      constructor(x, y, maxRadius) {
        this.x = x;
        this.y = y;
        this.radius = 10;
        this.maxRadius = maxRadius;
        this.lifetime = 24;
        this.maxLifetime = 24;
      }
      update() {
        this.lifetime--;
        this.radius = this.maxRadius * (1 - this.lifetime / this.maxLifetime);
      }
      draw() {
        const alpha = this.lifetime / this.maxLifetime;
        ctx.strokeStyle = `rgba(102, 217, 255, ${alpha})`;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(this.x - game.camera.x, this.y - game.camera.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x - game.camera.x, this.y - game.camera.y, Math.max(0, this.radius - 12), 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    class AttackEffect {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.lifetime = 8;
        this.maxLifetime = 8;
      }
      update() {
        this.lifetime--;
      }
      draw() {
        const progress = 1 - this.lifetime / this.maxLifetime;
        const size = 30 + progress * 20;
        const alpha = 1 - progress;
        ctx.fillStyle = `rgba(255,200,0,${alpha * 0.8})`;
        ctx.fillRect(this.x - game.camera.x - size / 2, this.y - game.camera.y - size / 2, size, size);
        ctx.strokeStyle = `rgba(255,255,100,${alpha})`;
        ctx.lineWidth = 3;
        ctx.strokeRect(this.x - game.camera.x - size / 2, this.y - game.camera.y - size / 2, size, size);
      }
    }

    class EnemyAttackIndicator {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.lifetime = 30;
        this.maxLifetime = 30;
        this.radius = 6;
      }
      update() {
        this.lifetime--;
        this.radius += 1.2;
      }
      draw() {
        const alpha = this.lifetime / this.maxLifetime;
        ctx.strokeStyle = `rgba(255,120,120,${alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x - game.camera.x, this.y - game.camera.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    class Player {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 20;
        this.height = 20;
        this.vx = 0;
        this.vy = 0;
        this.speed = 3;
        this.health = 100;
        this.maxHealth = 100;
        this.attackCooldown = 0;
        this.attackRange = 50;
        this.attackDamage = 15;
        this.projectileCooldown = 0;
        this.direction = 0;
        this.attackFlash = 0;
        this.bounceOffset = 0;
        this.lastFootprintTime = 0;

        this.maxAmmo = 3;
        this.currentAmmo = 3;
        this.isReloading = false;
        this.reloadTime = 120;
        this.reloadProgress = 0;

        this.lastDamageTime = 0;
        this.regenDelay = 300;
        this.regenRate = 0.05;

        this.specialCooldown = 360;
        this.specialTimer = 0;
        this.shockwaveRange = 180;
        this.shockwaveForce = 16;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        this.x = Math.max(0, Math.min(this.x, WORLD_WIDTH - this.width));
        this.y = Math.max(0, Math.min(this.y, WORLD_HEIGHT - this.height));

        this.bounceOffset = Math.sin(game.gameTime * 0.1) * 2;

        if ((this.vx !== 0 || this.vy !== 0) && game.gameTime - this.lastFootprintTime > 8) {
          game.footprints.push(new Footprint(this.x + this.width / 2, this.y + this.height / 2));
          for (let i = 0; i < 2; i++) {
            game.dust.push(new DustParticle(this.x + this.width / 2, this.y + this.height / 2));
          }
          this.lastFootprintTime = game.gameTime;
        }

        if (this.attackCooldown > 0) this.attackCooldown--;
        if (this.projectileCooldown > 0) this.projectileCooldown--;
        if (this.attackFlash > 0) this.attackFlash--;
        if (this.specialTimer > 0) this.specialTimer--;

        if (this.isReloading) {
          this.reloadProgress++;
          if (this.reloadProgress >= this.reloadTime) {
            this.currentAmmo = this.maxAmmo;
            this.isReloading = false;
            this.reloadProgress = 0;
          }
        }

        if (!game.isGameOver && game.gameTime - this.lastDamageTime > this.regenDelay && this.health < this.maxHealth) {
          this.health = Math.min(this.maxHealth, this.health + this.regenRate);
          document.getElementById("health").textContent = Math.ceil(this.health);
        }
      }

      draw() {
        const drawX = this.x - game.camera.x;
        const drawY = this.y - game.camera.y + this.bounceOffset;

        ctx.fillStyle = this.attackFlash > 0 ? "#ffff99" : "#e6d4a8";
        ctx.beginPath();
        ctx.arc(drawX + this.width / 2, drawY + this.width / 2, this.width / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#8b7355";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(drawX + this.width / 2 - 4, drawY + 6, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(drawX + this.width / 2 + 4, drawY + 6, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#000";
        ctx.beginPath();
        ctx.moveTo(drawX + this.width / 2 - 3, drawY + 12);
        ctx.lineTo(drawX + this.width / 2 + 3, drawY + 12);
        ctx.stroke();

        ctx.fillStyle = "#ff6600";
        let markerX = drawX + this.width / 2;
        let markerY = drawY + this.width / 2;
        if (this.direction === 0) markerY += 8;
        else if (this.direction === 1) markerY -= 8;
        else if (this.direction === 2) markerX -= 8;
        else if (this.direction === 3) markerX += 8;
        ctx.fillRect(markerX - 2, markerY - 2, 4, 4);
      }

      melee() {
        if (game.isGameOver || this.attackCooldown > 0) return;
        this.attackCooldown = 20;
        this.attackFlash = 8;

        let offsetX = 0, offsetY = 0;
        if (this.direction === 0) offsetY = this.attackRange;
        else if (this.direction === 1) offsetY = -this.attackRange;
        else if (this.direction === 2) offsetX = -this.attackRange;
        else if (this.direction === 3) offsetX = this.attackRange;

        game.attacks.push(new AttackEffect(this.x + this.width / 2 + offsetX, this.y + this.height / 2 + offsetY));

        for (const enemy of game.enemies) {
          const dx = enemy.x - this.x;
          const dy = enemy.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < this.attackRange + 20) enemy.takeDamage(this.attackDamage);
        }

        if (game.boss && game.boss.active) {
          const dx = game.boss.x - this.x;
          const dy = game.boss.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < this.attackRange + 20) game.boss.takeDamage(this.attackDamage);
        }
      }

      shoot() {
        if (game.isGameOver) return;

        if (this.currentAmmo === 0) {
          if (!this.isReloading) {
            this.isReloading = true;
            this.reloadProgress = 0;
          }
          return;
        }

        if (this.projectileCooldown > 0) return;
        this.projectileCooldown = 10;

        let vx = 0, vy = 0;
        if (this.direction === 0) vy = 5;
        else if (this.direction === 1) vy = -5;
        else if (this.direction === 2) vx = -5;
        else if (this.direction === 3) vx = 5;

        game.projectiles.push(new Projectile(this.x + this.width / 2, this.y + this.height / 2, vx, vy, 25, false));
        this.currentAmmo--;
      }

      useShockwave() {
        if (game.isGameOver || this.specialTimer > 0) return;

        this.specialTimer = this.specialCooldown;
        const cx = this.x + this.width / 2;
        const cy = this.y + this.height / 2;

        game.shockwaves.push(new ShockwaveEffect(cx, cy, this.shockwaveRange));

        for (const enemy of game.enemies) {
          const ex = enemy.x + enemy.width / 2;
          const ey = enemy.y + enemy.height / 2;
          const dx = ex - cx;
          const dy = ey - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist > 0 && dist <= this.shockwaveRange) {
            const strength = (1 - dist / this.shockwaveRange) * this.shockwaveForce;
            enemy.x += (dx / dist) * strength * 14;
            enemy.y += (dy / dist) * strength * 14;
            enemy.stunTimer = Math.max(enemy.stunTimer, 18);
            enemy.takeDamage(5);
          }
        }

        if (game.boss && game.boss.active) {
          const bx = game.boss.x + game.boss.width / 2;
          const by = game.boss.y + game.boss.height / 2;
          const dx = bx - cx;
          const dy = by - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist > 0 && dist <= this.shockwaveRange * 1.2) {
            const strength = (1 - dist / (this.shockwaveRange * 1.2)) * this.shockwaveForce;
            game.boss.x += (dx / dist) * strength * 5;
            game.boss.y += (dy / dist) * strength * 5;
            game.boss.takeDamage(8);
          }
        }
      }

      takeDamage(amount) {
        if (game.isGameOver) return;
        this.health -= amount;
        if (this.health < 0) this.health = 0;
        this.lastDamageTime = game.gameTime;
        document.getElementById("health").textContent = Math.ceil(this.health);
        if (this.health <= 0) game.isGameOver = true;
      }
    }

    class Enemy {
      constructor(x, y, type = "normal") {
        this.x = x;
        this.y = y;
        this.width = 24;
        this.height = 24;
        this.health = type === "strong" ? 30 : 15;
        this.maxHealth = this.health;
        this.speed = type === "strong" ? 1.5 : 1;
        this.type = type;
        this.attackCooldown = 0;
        this.damage = type === "strong" ? 15 : 10;
        this.bounceTime = Math.random() * 100;

        this.charging = false;
        this.chargeTimer = 0;
        this.chargeDuration = type === "strong" ? 36 : 28;
        this.stunTimer = 0;
      }
      update() {
        if (game.isGameOver) return;

        if (this.stunTimer > 0) {
          this.stunTimer--;
          this.bounceTime += 1;
          return;
        }

        const dx = game.player.x - this.x;
        const dy = game.player.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (!this.charging) {
          if (dist > 0) {
            this.x += (dx / dist) * this.speed;
            this.y += (dy / dist) * this.speed;
          }

          if (this.attackCooldown > 0) this.attackCooldown--;

          if (dist < 220 && this.attackCooldown === 0) {
            this.charging = true;
            this.chargeTimer = this.chargeDuration;
            game.attackIndicators.push(new EnemyAttackIndicator(game.player.x + game.player.width / 2, game.player.y + game.player.height / 2));
          }
        } else {
          this.chargeTimer--;
          if (this.chargeTimer <= 0) {
            this.charging = false;
            this.attackCooldown = this.type === "strong" ? 120 : 90;

            const sx = this.x + this.width / 2;
            const sy = this.y + this.height / 2;
            const tx = game.player.x + game.player.width / 2;
            const ty = game.player.y + game.player.height / 2;
            const ax = tx - sx;
            const ay = ty - sy;
            const ad = Math.sqrt(ax * ax + ay * ay) || 1;
            const speed = this.type === "strong" ? 4.4 : 3.8;
            const dmg = this.type === "strong" ? 18 : 12;

            game.projectiles.push(new Projectile(sx, sy, (ax / ad) * speed, (ay / ad) * speed, dmg, true, true));
          }
        }

        this.bounceTime += 1;
      }
      draw() {
        const drawX = this.x - game.camera.x;
        const drawY = this.y - game.camera.y;
        const bounceOffset = Math.sin(this.bounceTime * 0.15) * 3;

        const bodyColor = this.type === "strong" ? "#ff8800" : "#00ff00";
        const outlineColor = this.type === "strong" ? "#cc6600" : "#00cc00";

        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(drawX + this.width / 2, drawY + this.height / 2 + bounceOffset, this.width / 2, this.height / 2.2, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = outlineColor;
        ctx.lineWidth = 2;
        ctx.stroke();

        if (this.charging) {
          const pct = 1 - this.chargeTimer / this.chargeDuration;
          ctx.strokeStyle = "#ff5555";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(drawX + this.width / 2, drawY + this.height / 2 + bounceOffset, 14 + pct * 10, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath();
        ctx.ellipse(drawX + this.width / 2 - 3, drawY + this.height / 2 - 3 + bounceOffset, this.width / 6, this.height / 6, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(drawX + this.width / 2 - 5, drawY + this.height / 2 - 2 + bounceOffset, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(drawX + this.width / 2 + 5, drawY + this.height / 2 - 2 + bounceOffset, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f00";
        ctx.fillRect(drawX, drawY - 8, this.width, 3);
        ctx.fillStyle = "#0f0";
        ctx.fillRect(drawX, drawY - 8, this.width * (this.health / this.maxHealth), 3);
      }
      takeDamage(amount) {
        this.health -= amount;
      }
    }

    class Boss {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 96;
        this.height = 96;
        this.health = 1000;
        this.maxHealth = 1000;
        this.speed = 1;
        this.attackCooldown = 0;
        this.phase = 1;
        this.active = true;
        this.bounceTime = Math.random() * 100;
      }
      update() {
        if (!this.active || game.isGameOver) return;

        const dx = game.player.x - this.x;
        const dy = game.player.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 100) {
          this.x += (dx / dist) * this.speed;
          this.y += (dy / dist) * this.speed;
        } else if (dist < 80 && dist > 0) {
          this.x -= (dx / dist) * this.speed * 0.5;
          this.y -= (dy / dist) * this.speed * 0.5;
        }

        if (this.attackCooldown > 0) this.attackCooldown--;
        if (dist < 150 && this.attackCooldown === 0) {
          this.attack();
          this.attackCooldown = 90;
        }

        if (this.health < this.maxHealth * 0.5) {
          this.phase = 2;
          this.speed = 1.5;
        }

        this.bounceTime += 1;

        this.x = Math.max(0, Math.min(this.x, WORLD_WIDTH - this.width));
        this.y = Math.max(0, Math.min(this.y, WORLD_HEIGHT - this.height));
      }
      attack() {
        const projectileCount = this.phase === 1 ? 4 : 8;
        for (let i = 0; i < projectileCount; i++) {
          const angle = (Math.PI * 2 * i) / projectileCount;
          game.projectiles.push(new Projectile(
            this.x + this.width / 2,
            this.y + this.height / 2,
            Math.cos(angle) * 3,
            Math.sin(angle) * 3,
            5,
            true,
            false
          ));
        }
      }
      draw() {
        const drawX = this.x - game.camera.x;
        const drawY = this.y - game.camera.y;
        const bounceOffset = Math.sin(this.bounceTime * 0.12) * 5;

        const bodyColor = "#ff4dd2";
        const outlineColor = "#d91aa6";

        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.ellipse(
          drawX + this.width / 2,
          drawY + this.height / 2 + bounceOffset,
          this.width / 2,
          this.height / 2.2,
          0,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.strokeStyle = outlineColor;
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.beginPath();
        ctx.ellipse(
          drawX + this.width / 2 - 12,
          drawY + this.height / 2 - 14 + bounceOffset,
          this.width / 7,
          this.height / 7,
          0,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(drawX + this.width / 2 - 14, drawY + this.height / 2 - 6 + bounceOffset, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(drawX + this.width / 2 + 14, drawY + this.height / 2 - 6 + bounceOffset, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#7a004d";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(drawX + this.width / 2 - 10, drawY + this.height / 2 + 12 + bounceOffset);
        ctx.lineTo(drawX + this.width / 2 + 10, drawY + this.height / 2 + 12 + bounceOffset);
        ctx.stroke();

        ctx.fillStyle = "#f00";
        ctx.fillRect(drawX - 10, drawY - 20, this.width + 20, 10);
        ctx.fillStyle = "#0f0";
        ctx.fillRect(drawX - 10, drawY - 20, (this.width + 20) * (this.health / this.maxHealth), 10);
      }
      takeDamage(amount) {
        this.health -= amount;
        if (this.health <= 0) {
          this.health = 0;
          this.active = false;
          const bossHealthEl = document.getElementById("bossHealth");
          const bossHealthBarEl = document.getElementById("bossHealthBar");
          if (bossHealthEl) bossHealthEl.style.display = "none";
          if (bossHealthBarEl) bossHealthBarEl.textContent = "0";
        }
      }
    }

    class Projectile {
      constructor(x, y, vx, vy, damage, isEnemyProjectile = false, isChargedArrow = false) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.damage = damage;
        this.size = isChargedArrow ? 10 : 6;
        this.isEnemyProjectile = isEnemyProjectile;
        this.isChargedArrow = isChargedArrow;
        this.lifetime = 300;
      }
      update() {
        if (game.isGameOver) return;
        this.x += this.vx;
        this.y += this.vy;
        this.lifetime--;

        if (!this.isEnemyProjectile) {
          for (const enemy of game.enemies) {
            if (this.collidesWith(enemy)) {
              enemy.takeDamage(this.damage);
              this.lifetime = 0;
              break;
            }
          }
          if (game.boss && game.boss.active && this.collidesWith(game.boss)) {
            game.boss.takeDamage(this.damage);
            this.lifetime = 0;
          }
        } else {
          if (this.collidesWith(game.player)) {
            game.attackIndicators.push(new EnemyAttackIndicator(game.player.x, game.player.y));
            game.player.takeDamage(this.damage);
            this.lifetime = 0;
          }
        }
      }
      collidesWith(obj) {
        return Math.abs(this.x - (obj.x + obj.width / 2)) < this.size + obj.width / 2 &&
               Math.abs(this.y - (obj.y + obj.height / 2)) < this.size + obj.height / 2;
      }
      draw() {
        if (this.isEnemyProjectile && this.isChargedArrow) {
          const px = this.x - game.camera.x;
          const py = this.y - game.camera.y;
          const angle = Math.atan2(this.vy, this.vx);

          ctx.save();
          ctx.translate(px, py);
          ctx.rotate(angle);

          ctx.fillStyle = "#ff6644";
          ctx.beginPath();
          ctx.moveTo(10, 0);
          ctx.lineTo(-8, -4);
          ctx.lineTo(-8, 4);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "#ffd6c9";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-10, 0);
          ctx.lineTo(8, 0);
          ctx.stroke();

          ctx.restore();
        } else {
          ctx.fillStyle = this.isEnemyProjectile ? "#ff00ff" : "#ffff00";
          ctx.fillRect(this.x - game.camera.x, this.y - game.camera.y, this.size, this.size);
        }
      }
    }

    const keys = {};

    function resetGame() {
      game.enemies = [];
      game.projectiles = [];
      game.attacks = [];
      game.attackIndicators = [];
      game.footprints = [];
      game.dust = [];
      game.shockwaves = [];
      game.boss = null;
      game.gameTime = 0;
      game.enemiesKilled = 0;
      game.isGameOver = false;

      game.player = new Player(WORLD_WIDTH / 2, WORLD_HEIGHT / 2);

      document.getElementById("health").textContent = "100";
      document.getElementById("enemiesKilled").textContent = "0";
      document.getElementById("ammoCount").textContent = "3";
      document.getElementById("reloadBar").style.display = "none";
      document.getElementById("bossHealth").style.display = "none";
      document.getElementById("bossHealthBar").textContent = "0";
      document.getElementById("specialStatus").textContent = "READY";
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

  if (key === "w") keys.w = true;
  if (key === "a") keys.a = true;
  if (key === "s") keys.s = true; // S moves down
  if (key === "d") keys.d = true;

  // Shockwave should be X only
  if (key === "x" && shockwaveReady) triggerShockwave();
});

window.addEventListener("keyup", (e) => {
  const key = e.key.toLowerCase();

  if (key === "w") keys.w = false;
  if (key === "a") keys.a = false;
  if (key === "s") keys.s = false;
  if (key === "d") keys.d = false;
});
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(key)) {
        e.preventDefault();
      }

      if ((key === "x") && !keys[key]) {
        if (!game.isGameOver) game.player.useShockwave();
      }

      keys[key] = true;

      if (key === "r" && game.isGameOver) {
        resetGame();
        return;
      }

      if (key === " ") {
        if (!game.isGameOver) game.player.shoot();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    canvas.addEventListener("click", () => {
      if (!game.isGameOver) game.player.melee();
    });

    function handleInput() {
      if (game.isGameOver) {
        game.player.vx = 0;
        game.player.vy = 0;
        return;
      }

      game.player.vx = 0;
      game.player.vy = 0;

      const dirs = {
        w: [0, -1], arrowup: [0, -1],
        a: [-1, 0], arrowleft: [-1, 0],
        d: [1, 0], arrowright: [1, 0]
      };

      for (const key in dirs) {
        if (keys[key]) {
          game.player.vx += dirs[key][0] * game.player.speed;
          game.player.vy += dirs[key][1] * game.player.speed;
          game.player.direction =
            key === "w" || key === "arrowup" ? 1 :
            key === "a" || key === "arrowleft" ? 2 : 3;
        }
      }
    }

    function spawnEnemies() {
      if (game.isGameOver) return;

      if (Math.random() < game.enemySpawnRate && game.enemies.length < 20) {
        const side = Math.floor(Math.random() * 4);
        let x, y;
        if (side === 0) { x = Math.random() * WORLD_WIDTH; y = -20; }
        else if (side === 1) { x = WORLD_WIDTH + 20; y = Math.random() * WORLD_HEIGHT; }
        else if (side === 2) { x = Math.random() * WORLD_WIDTH; y = WORLD_HEIGHT + 20; }
        else { x = -20; y = Math.random() * WORLD_HEIGHT; }

        const type = Math.random() < 0.3 ? "strong" : "normal";
        game.enemies.push(new Enemy(x, y, type));
      }
    }

    function spawnBoss() {
      if (!game.boss || !game.boss.active) {
        game.boss = new Boss(WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
        document.getElementById("bossHealth").style.display = "block";
        document.getElementById("bossHealthBar").textContent = String(game.boss.maxHealth);
      }
    }

    function updateCamera() {
      game.camera.x = game.player.x - canvas.width / 2;
      game.camera.y = game.player.y - canvas.height / 2;
      game.camera.x = Math.max(0, Math.min(game.camera.x, WORLD_WIDTH - canvas.width));
      game.camera.y = Math.max(0, Math.min(game.camera.y, WORLD_HEIGHT - canvas.height));
    }

    function drawTerrain() {
      ctx.fillStyle = "#2a241f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const startX = Math.floor(game.camera.x / TILE_SIZE);
      const startY = Math.floor(game.camera.y / TILE_SIZE);
      const endX = Math.ceil((game.camera.x + canvas.width) / TILE_SIZE);
      const endY = Math.ceil((game.camera.y + canvas.height) / TILE_SIZE);

      const rockColors = ["#5a4f45", "#4a4138", "#6a5d50", "#3d362f", "#74685b"];
      const pebbleColors = ["#8b7e70", "#7a6d60", "#a09284", "#665b50"];

      const seededRandom = (seed) => {
        const x = Math.sin(seed * 12.9898) * 43758.5453;
        return x - Math.floor(x);
      };

      for (let tileX = startX; tileX < endX; tileX++) {
        for (let tileY = startY; tileY < endY; tileY++) {
          const seed = (tileX * 73856093) ^ (tileY * 19349663);
          const screenX = tileX * TILE_SIZE - game.camera.x;
          const screenY = tileY * TILE_SIZE - game.camera.y;

          const baseColor = rockColors[Math.floor(seededRandom(seed) * rockColors.length)];
          ctx.fillStyle = baseColor;
          ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);

          const crackCount = 1 + Math.floor(seededRandom(seed + 1) * 3);
          for (let c = 0; c < crackCount; c++) {
            const crackSeed = seed + c * 97;
            const x1 = screenX + seededRandom(crackSeed) * TILE_SIZE;
            const y1 = screenY + seededRandom(crackSeed + 1) * TILE_SIZE;
            const x2 = x1 + (seededRandom(crackSeed + 2) - 0.5) * 14;
            const y2 = y1 + (seededRandom(crackSeed + 3) - 0.5) * 14;

            ctx.strokeStyle = "rgba(30, 25, 20, 0.45)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
          }

          const pebbleCount = 3 + Math.floor(seededRandom(seed + 4) * 5);
          for (let p = 0; p < pebbleCount; p++) {
            const pebbleSeed = seed + p * 137;
            const px = screenX + 2 + seededRandom(pebbleSeed) * (TILE_SIZE - 4);
            const py = screenY + 2 + seededRandom(pebbleSeed + 1) * (TILE_SIZE - 4);
            const radius = 0.8 + seededRandom(pebbleSeed + 2) * 1.8;
            const color = pebbleColors[Math.floor(seededRandom(pebbleSeed + 3) * pebbleColors.length)];

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
          ctx.fillRect(screenX, screenY, TILE_SIZE, 1);
          ctx.fillRect(screenX, screenY, 1, TILE_SIZE);
        }
      }
    }

    function update() {
      game.gameTime++;

      if (game.isGameOver) {
        updateCamera();
        return;
      }

      handleInput();
      spawnEnemies();

      if (game.enemiesKilled >= 15 && !game.boss) {
        spawnBoss();
      }

      game.player.update();

      for (const enemy of game.enemies) enemy.update();

      if (game.boss) {
        if (game.boss.active) {
          game.boss.update();
          document.getElementById("bossHealthBar").textContent = Math.max(0, Math.ceil(game.boss.health));
        } else {
          document.getElementById("bossHealth").style.display = "none";
          document.getElementById("bossHealthBar").textContent = "0";
        }
      }

      for (const projectile of game.projectiles) projectile.update();
      for (const attack of game.attacks) attack.update();
      for (const footprint of game.footprints) footprint.update();
      for (const dust of game.dust) dust.update();
      for (const indicator of game.attackIndicators) indicator.update();
      for (const wave of game.shockwaves) wave.update();

      game.projectiles = game.projectiles.filter(p => p.lifetime > 0);
      game.attacks = game.attacks.filter(a => a.lifetime > 0);
      game.shockwaves = game.shockwaves.filter(w => w.lifetime > 0);

      const newEnemies = game.enemies.filter(e => e.health > 0);
      const killedThisFrame = game.enemies.length - newEnemies.length;
      game.enemiesKilled += killedThisFrame;
      game.enemies = newEnemies;

      game.footprints = game.footprints.filter(f => f.lifetime > 0);
      game.dust = game.dust.filter(d => d.lifetime > 0);
      game.attackIndicators = game.attackIndicators.filter(i => i.lifetime > 0);

      document.getElementById("health").textContent = Math.ceil(game.player.health);
      document.getElementById("enemiesKilled").textContent = Math.min(game.enemiesKilled, 15);
      document.getElementById("ammoCount").textContent = game.player.currentAmmo;

      if (game.player.isReloading) {
        document.getElementById("reloadBar").style.display = "block";
        const percent = Math.floor((game.player.reloadProgress / game.player.reloadTime) * 100);
        document.getElementById("reloadPercent").textContent = percent;
      } else {
        document.getElementById("reloadBar").style.display = "none";
      }

      const specialStatus = document.getElementById("specialStatus");
      if (game.player.specialTimer > 0) {
        const sec = (game.player.specialTimer / 60).toFixed(1);
        specialStatus.textContent = `${sec}s`;
        specialStatus.style.color = "#ffcc66";
      } else {
        specialStatus.textContent = "READY";
        specialStatus.style.color = "#66ff99";
      }

      updateCamera();
    }

    function draw() {
      drawTerrain();

      for (const footprint of game.footprints) footprint.draw();
      for (const dust of game.dust) dust.draw();
      for (const wave of game.shockwaves) wave.draw();
      for (const projectile of game.projectiles) projectile.draw();
      for (const enemy of game.enemies) enemy.draw();

      if (game.boss && game.boss.active) game.boss.draw();

      for (const attack of game.attacks) attack.draw();
      for (const indicator of game.attackIndicators) indicator.draw();

      game.player.draw();

      if (game.isGameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ff4444";
        ctx.font = "bold 56px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

        ctx.fillStyle = "#ffffff";
        ctx.font = "24px Arial";
        ctx.fillText("Press R to restart", canvas.width / 2, canvas.height / 2 + 30);
        ctx.textAlign = "left";
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    game.player = new Player(WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
    game.attackIndicators = [];
    gameLoop();
  </script>
</body>
</html>
