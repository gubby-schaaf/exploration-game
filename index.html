<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exploration Game</title>
  <style>
    body {
      margin: 0;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border: 2px solid #fff;
      background: #1f1a16;
    }

    #ui {
      position: absolute;
      top: 14px;
      left: 14px;
      color: #fff;
      font-size: 14px;
      background: rgba(0,0,0,0.65);
      padding: 10px;
      border: 1px solid #fff;
      line-height: 1.35;
    }

    #ammo {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: #ff0;
      border: 2px solid #ff0;
      background: rgba(0,0,0,0.65);
      padding: 8px 12px;
      font-size: 18px;
    }

    #special {
      position: absolute;
      bottom: 16px;
      right: 16px;
      color: #66d9ff;
      border: 2px solid #66d9ff;
      background: rgba(0,0,0,0.65);
      padding: 8px 12px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1100" height="700"></canvas>

  <div id="ui">
    <div>Health: <span id="health">100</span>/100</div>
    <div>Enemies Killed: <span id="killed">0</span>/15</div>
    <div>W/A/S/D or Arrow Keys to move | Click to melee | Space to shoot | X = Shockwave</div>
  </div>

  <div id="ammo">Arrows: <span id="ammoCount">3</span>/3</div>
  <div id="special">Shockwave (X): <span id="shockStatus">READY</span></div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const healthEl = document.getElementById("health");
    const killedEl = document.getElementById("killed");
    const ammoEl = document.getElementById("ammoCount");
    const shockEl = document.getElementById("shockStatus");

    const keys = {};

    const game = {
      over: false,
      killed: 0,
      enemies: [],
      projectiles: [],
      particles: [],
      t: 0
    };

    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      r: 13,
      speed: 3.2,
      hp: 100,
      dirX: 0,
      dirY: 1,

      ammo: 3,
      shootCd: 0,
      reloadTimer: 0,

      meleeCd: 0,

      shockCd: 0
    };

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function spawnEnemy() {
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = rand(0, canvas.width); y = -20; }
      else if (side === 1) { x = canvas.width + 20; y = rand(0, canvas.height); }
      else if (side === 2) { x = rand(0, canvas.width); y = canvas.height + 20; }
      else { x = -20; y = rand(0, canvas.height); }

      game.enemies.push({
        x, y,
        r: 12,
        hp: 25,
        speed: rand(0.8, 1.4)
      });
    }

    function shoot() {
      if (game.over) return;
      if (player.shootCd > 0) return;

      if (player.ammo <= 0) {
        if (player.reloadTimer <= 0) player.reloadTimer = 90; // ~1.5s at 60fps
        return;
      }

      let dx = player.dirX;
      let dy = player.dirY;
      if (dx === 0 && dy === 0) dy = 1;

      const mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      game.projectiles.push({
        x: player.x,
        y: player.y,
        vx: dx * 7,
        vy: dy * 7,
        r: 4,
        dmg: 13,
        life: 100
      });

      player.ammo--;
      player.shootCd = 10;
    }

    function melee() {
      if (game.over) return;
      if (player.meleeCd > 0) return;

      player.meleeCd = 18;

      const range = 58;
      for (const e of game.enemies) {
        const dx = e.x - player.x;
        const dy = e.y - player.y;
        const d = Math.hypot(dx, dy);
        if (d < range) e.hp -= 18;
      }

      for (let i = 0; i < 18; i++) {
        game.particles.push({
          x: player.x,
          y: player.y,
          vx: rand(-3, 3),
          vy: rand(-3, 3),
          life: 16,
          color: "rgba(255,220,120,0.9)"
        });
      }
    }

    function shockwave() {
      if (game.over) return;
      if (player.shockCd > 0) return;

      player.shockCd = 360; // 6 seconds at 60fps
      const radius = 170;

      for (const e of game.enemies) {
        const dx = e.x - player.x;
        const dy = e.y - player.y;
        const d = Math.hypot(dx, dy);
        if (d > 0 && d < radius) {
          const force = (1 - d / radius) * 20;
          e.x += (dx / d) * force * 3;
          e.y += (dy / d) * force * 3;
          e.hp -= 8;
        }
      }

      for (let i = 0; i < 42; i++) {
        const a = (Math.PI * 2 * i) / 42;
        game.particles.push({
          x: player.x,
          y: player.y,
          vx: Math.cos(a) * 4,
          vy: Math.sin(a) * 4,
          life: 26,
          color: "rgba(102,217,255,0.9)"
        });
      }
    }

    function updateInput() {
      let vx = 0, vy = 0;
      if (keys["w"] || keys["arrowup"]) vy -= 1;
      if (keys["s"] || keys["arrowdown"]) vy += 1;
      if (keys["a"] || keys["arrowleft"]) vx -= 1;
      if (keys["d"] || keys["arrowright"]) vx += 1;

      if (vx !== 0 || vy !== 0) {
        const m = Math.hypot(vx, vy);
        vx /= m; vy /= m;
        player.dirX = vx;
        player.dirY = vy;
      }

      player.x += vx * player.speed;
      player.y += vy * player.speed;

      player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
      player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));
    }

    function update() {
      game.t++;

      if (game.over) return;

      if (Math.random() < 0.02 && game.enemies.length < 24) spawnEnemy();

      updateInput();

      if (player.shootCd > 0) player.shootCd--;
      if (player.meleeCd > 0) player.meleeCd--;
      if (player.shockCd > 0) player.shockCd--;

      if (player.reloadTimer > 0) {
        player.reloadTimer--;
        if (player.reloadTimer <= 0) player.ammo = 3;
      }

      for (const p of game.projectiles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
      }

      for (const e of game.enemies) {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.hypot(dx, dy) || 1;
        e.x += (dx / d) * e.speed;
        e.y += (dy / d) * e.speed;

        if (d < e.r + player.r) {
          player.hp -= 0.12;
          if (player.hp <= 0) {
            player.hp = 0;
            game.over = true;
          }
        }
      }

      // Projectile hit enemies
      for (const p of game.projectiles) {
        for (const e of game.enemies) {
          const d = Math.hypot(p.x - e.x, p.y - e.y);
          if (d < p.r + e.r) {
            e.hp -= p.dmg;
            p.life = 0;
            break;
          }
        }
      }

      // Remove dead enemies
      const before = game.enemies.length;
      game.enemies = game.enemies.filter(e => e.hp > 0);
      game.killed += (before - game.enemies.length);

      if (game.killed >= 15) {
        // win state (optional stop)
        game.over = true;
      }

      // Clean arrays
      game.projectiles = game.projectiles.filter(p =>
        p.life > 0 &&
        p.x > -20 && p.x < canvas.width + 20 &&
        p.y > -20 && p.y < canvas.height + 20
      );

      for (const pt of game.particles) {
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.life--;
      }
      game.particles = game.particles.filter(pt => pt.life > 0);

      // UI
      healthEl.textContent = Math.ceil(player.hp);
      killedEl.textContent = Math.min(game.killed, 15);
      ammoEl.textContent = player.ammo;

      if (player.shockCd > 0) {
        shockEl.textContent = (player.shockCd / 60).toFixed(1) + "s";
        shockEl.style.color = "#ffcc66";
      } else {
        shockEl.textContent = "READY";
        shockEl.style.color = "#66ff99";
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#2b241f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // simple rock-like noise
      for (let i = 0; i < 200; i++) {
        const x = (i * 73) % canvas.width;
        const y = (i * 149) % canvas.height;
        const w = ((i * 11) % 5) + 1;
        ctx.fillStyle = i % 2 ? "rgba(255,255,255,0.03)" : "rgba(0,0,0,0.07)";
        ctx.fillRect(x, y, w, w);
      }
    }

    function draw() {
      drawBackground();

      // particles
      for (const pt of game.particles) {
        ctx.fillStyle = pt.color;
        ctx.fillRect(pt.x, pt.y, 3, 3);
      }

      // projectiles
      ctx.fillStyle = "#ff0";
      for (const p of game.projectiles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      // enemies
      for (const e of game.enemies) {
        ctx.fillStyle = "#2cff2c";
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.fill();

        // hp bar
        ctx.fillStyle = "#f00";
        ctx.fillRect(e.x - 14, e.y - 20, 28, 4);
        ctx.fillStyle = "#0f0";
        ctx.fillRect(e.x - 14, e.y - 20, 28 * Math.max(0, e.hp / 25), 4);
      }

      // player
      ctx.fillStyle = "#e6d4a8";
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
      ctx.fill();

      // face
      ctx.fillStyle = "#000";
      ctx.beginPath(); ctx.arc(player.x - 4, player.y - 3, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(player.x + 4, player.y - 3, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(player.x - 3, player.y + 4, 6, 1.5);

      // direction marker
      ctx.fillStyle = "#ff6600";
      ctx.fillRect(player.x + player.dirX * 10 - 2, player.y + player.dirY * 10 - 2, 4, 4);

      if (game.over) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 48px Arial";
        ctx.fillText(game.killed >= 15 ? "YOU WIN!" : "GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "22px Arial";
        ctx.fillText("Press R to restart", canvas.width / 2, canvas.height / 2 + 30);
        ctx.textAlign = "left";
      }
    }

    function restart() {
      game.over = false;
      game.killed = 0;
      game.enemies = [];
      game.projectiles = [];
      game.particles = [];
      game.t = 0;

      player.x = canvas.width / 2;
      player.y = canvas.height / 2;
      player.hp = 100;
      player.ammo = 3;
      player.shootCd = 0;
      player.reloadTimer = 0;
      player.meleeCd = 0;
      player.shockCd = 0;

      healthEl.textContent = "100";
      killedEl.textContent = "0";
      ammoEl.textContent = "3";
      shockEl.textContent = "READY";
      shockEl.style.color = "#66ff99";
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(key)) {
        e.preventDefault();
      }

      if (key === " " && !game.over) shoot();
      if (key === "x" && !game.over) shockwave();
      if (key === "r" && game.over) restart();
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    canvas.addEventListener("click", () => {
      melee();
    });

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
