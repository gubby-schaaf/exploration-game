<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploration Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #fff;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 1px solid #fff;
        }
        #ammo {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ffff00;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 2px solid #ffff00;
        }
        #bossHealth {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff0000;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 1px solid #ff0000;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">
        <div>Health: <span id="health">100</span>/100</div>
        <div>Enemies: <span id="enemies">0</span></div>
        <div>WASD or Arrow Keys to move | Click to melee | Space to shoot</div>
    </div>
    <div id="ammo">
        Arrows: <span id="ammoCount">3</span>/3
        <div id="reloadBar" style="display: none; margin-top: 5px;">
            Reloading: <span id="reloadPercent">0</span>%
        </div>
    </div>
    <div id="bossHealth">
        <div>Boss Health: <span id="bossHealthBar">0</span>/1000</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const TILE_SIZE = 32;
        const WORLD_WIDTH = 2560;
        const WORLD_HEIGHT = 1920;

        // Game state
        const game = {
            player: null,
            enemies: [],
            projectiles: [],
            attacks: [],
            boss: null,
            camera: { x: 0, y: 0 },
            wave: 1,
            enemySpawnRate: 0.02,
            gameTime: 0
        };

        // Attack Effect class
        class AttackEffect {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.direction = direction;
                this.lifetime = 8;
                this.maxLifetime = 8;
            }

            update() {
                this.lifetime--;
            }

            draw(ctx) {
                const progress = 1 - (this.lifetime / this.maxLifetime);
                const size = 30 + progress * 20;
                const alpha = 1 - progress;
                
                ctx.fillStyle = `rgba(255, 200, 0, ${alpha * 0.8})`;
                ctx.fillRect(this.x - game.camera.x - size/2, this.y - game.camera.y - size/2, size, size);
                
                ctx.strokeStyle = `rgba(255, 255, 100, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.strokeRect(this.x - game.camera.x - size/2, this.y - game.camera.y - size/2, size, size);
            }
        }

        // Player class
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 20;
                this.height = 20;
                this.vx = 0;
                this.vy = 0;
                this.speed = 3;
                this.health = 100;
                this.maxHealth = 100;
                this.attackCooldown = 0;
                this.attackRange = 50;
                this.attackDamage = 15;
                this.projectileCooldown = 0;
                this.direction = 0;
                this.attackFlash = 0;
                this.bounceOffset = 0;
                
                // Ammo system
                this.maxAmmo = 3;
                this.currentAmmo = 3;
                this.isReloading = false;
                this.reloadTime = 120; // 2 seconds at 60fps
                this.reloadProgress = 0;
            }

            update() {
                // Movement
                this.x += this.vx;
                this.y += this.vy;

                // World boundaries
                this.x = Math.max(0, Math.min(this.x, WORLD_WIDTH - this.width));
                this.y = Math.max(0, Math.min(this.y, WORLD_HEIGHT - this.height));

                // Bounce animation
                this.bounceOffset = Math.sin(game.gameTime * 0.1) * 2;

                // Cooldowns
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.projectileCooldown > 0) this.projectileCooldown--;
                if (this.attackFlash > 0) this.attackFlash--;

                // Reload system
                if (this.isReloading) {
                    this.reloadProgress++;
                    if (this.reloadProgress >= this.reloadTime) {
                        this.currentAmmo = this.maxAmmo;
                        this.isReloading = false;
                        this.reloadProgress = 0;
                    }
                }
            }

            draw(ctx) {
                const drawX = this.x - game.camera.x;
                const drawY = this.y - game.camera.y + this.bounceOffset;

                // Draw body (tan/beige color)
                ctx.fillStyle = this.attackFlash > 0 ? '#ffff99' : '#e6d4a8';
                ctx.beginPath();
                ctx.arc(drawX + this.width/2, drawY + this.width/2, this.width/2, 0, Math.PI * 2);
                ctx.fill();

                // Draw outline
                ctx.strokeStyle = '#8b7355';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Draw left eye
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(drawX + this.width/2 - 4, drawY + 6, 2, 0, Math.PI * 2);
                ctx.fill();

                // Draw right eye
                ctx.beginPath();
                ctx.arc(drawX + this.width/2 + 4, drawY + 6, 2, 0, Math.PI * 2);
                ctx.fill();

                // Draw mouth (simple line)
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(drawX + this.width/2 - 3, drawY + 12);
                ctx.lineTo(drawX + this.width/2 + 3, drawY + 12);
                ctx.stroke();

                // Draw direction indicator (hat/direction marker)
                ctx.fillStyle = '#ff6600';
                let markerX = drawX + this.width/2;
                let markerY = drawY + this.width/2;
                
                if (this.direction === 0) markerY += 8; // down
                else if (this.direction === 1) markerY -= 8; // up
                else if (this.direction === 2) markerX -= 8; // left
                else if (this.direction === 3) markerX += 8; // right

                ctx.fillRect(markerX - 2, markerY - 2, 4, 4);
            }

            melee() {
                if (this.attackCooldown > 0) return;
                this.attackCooldown = 20;
                this.attackFlash = 8;

                let offsetX = 0, offsetY = 0;
                if (this.direction === 0) offsetY = this.attackRange;
                else if (this.direction === 1) offsetY = -this.attackRange;
                else if (this.direction === 2) offsetX = -this.attackRange;
                else if (this.direction === 3) offsetX = this.attackRange;

                game.attacks.push(new AttackEffect(
                    this.x + this.width/2 + offsetX,
                    this.y + this.height/2 + offsetY,
                    this.direction
                ));

                for (let enemy of game.enemies) {
                    const dx = enemy.x - this.x;
                    const dy = enemy.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < this.attackRange + 20) {
                        enemy.takeDamage(this.attackDamage);
                    }
                }

                if (game.boss && game.boss.active) {
                    const dx = game.boss.x - this.x;
                    const dy = game.boss.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < this.attackRange + 20) {
                        game.boss.takeDamage(this.attackDamage);
                    }
                }
            }

            shoot() {
                // Check if out of ammo - start reload
                if (this.currentAmmo === 0) {
                    if (!this.isReloading) {
                        this.isReloading = true;
                        this.reloadProgress = 0;
                    }
                    return;
                }

                if (this.projectileCooldown > 0) return;
                this.projectileCooldown = 10;

                // Fire projectile in direction facing
                let vx = 0, vy = 0;
                if (this.direction === 0) vy = 5; // down
                else if (this.direction === 1) vy = -5; // up
                else if (this.direction === 2) vx = -5; // left
                else if (this.direction === 3) vx = 5; // right

                game.projectiles.push(new Projectile(
                    this.x + this.width/2,
                    this.y + this.height/2,
                    vx,
                    vy,
                    25
                ));

                this.currentAmmo--;

                // Update UI
                document.getElementById('ammoCount').textContent = this.currentAmmo;
            }

            takeDamage(amount) {
                this.health -= amount;
                if (this.health < 0) this.health = 0;
            }
        }

        // Enemy class (Slime)
        class Enemy {
            constructor(x, y, type = 'normal') {
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 24;
                this.health = type === 'strong' ? 30 : 15;
                this.maxHealth = this.health;
                this.speed = type === 'strong' ? 1.5 : 1;
                this.type = type;
                this.attackCooldown = 0;
                this.damage = type === 'strong' ? 15 : 10;
                this.bounceTime = Math.random() * 100;
            }

            update() {
                // Chase player
                const dx = game.player.x - this.x;
                const dy = game.player.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 0) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }

                this.bounceTime += 1;

                // Attack player if close
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (dist < 40 && this.attackCooldown === 0) {
                    game.player.takeDamage(this.damage);
                    this.attackCooldown = 60;
                }
            }

            draw(ctx) {
                const drawX = this.x - game.camera.x;
                const drawY = this.y - game.camera.y;
                const bounceOffset = Math.sin(this.bounceTime * 0.15) * 3;

                // Slime body color
                const bodyColor = this.type === 'strong' ? '#ff8800' : '#00ff00';
                const outlineColor = this.type === 'strong' ? '#cc6600' : '#00cc00';

                // Draw main body (jellybean/slime shape)
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.ellipse(drawX + this.width/2, drawY + this.height/2 + bounceOffset, this.width/2, this.height/2.2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw outline
                ctx.strokeStyle = outlineColor;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw wobble/shine effect
                ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                ctx.beginPath();
                ctx.ellipse(drawX + this.width/2 - 3, drawY + this.height/2 - 3 + bounceOffset, this.width/6, this.height/6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw left eye
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(drawX + this.width/2 - 5, drawY + this.height/2 - 2 + bounceOffset, 2, 0, Math.PI * 2);
                ctx.fill();

                // Draw right eye
                ctx.beginPath();
                ctx.arc(drawX + this.width/2 + 5, drawY + this.height/2 - 2 + bounceOffset, 2, 0, Math.PI * 2);
                ctx.fill();

                // Health bar
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(drawX, drawY - 8, this.width, 3);
                ctx.fillStyle = '#00ff00';
                const healthBarWidth = this.width * (this.health / this.maxHealth);
                ctx.fillRect(drawX, drawY - 8, healthBarWidth, 3);
            }

            takeDamage(amount) {
                this.health -= amount;
            }
        }

        // Boss class
        class Boss {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 60;
                this.height = 60;
                this.health = 1000;
                this.maxHealth = 1000;
                this.speed = 1;
                this.attackCooldown = 0;
                this.damage = 25;
                this.phase = 1;
                this.actionCooldown = 0;
                this.active = true;
            }

            update() {
                if (!this.active) return;

                const dx = game.player.x - this.x;
                const dy = game.player.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 100) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                } else if (dist < 80) {
                    this.x -= (dx / dist) * (this.speed * 0.5);
                    this.y -= (dy / dist) * (this.speed * 0.5);
                }

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (dist < 150 && this.attackCooldown === 0) {
                    this.attack();
                    this.attackCooldown = 90;
                }

                if (this.health < this.maxHealth * 0.5) {
                    this.phase = 2;
                    this.speed = 1.5;
                }

                this.x = Math.max(0, Math.min(this.x, WORLD_WIDTH - this.width));
                this.y = Math.max(0, Math.min(this.y, WORLD_HEIGHT - this.height));
            }

            attack() {
                const projectileCount = this.phase === 1 ? 4 : 8;
                for (let i = 0; i < projectileCount; i++) {
                    const angle = (Math.PI * 2 * i) / projectileCount;
                    const vx = Math.cos(angle) * 3;
                    const vy = Math.sin(angle) * 3;
                    game.projectiles.push(new Projectile(
                        this.x + this.width/2,
                        this.y + this.height/2,
                        vx,
                        vy,
                        5,
                        true
                    ));
                }
            }

            draw(ctx) {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(this.x - game.camera.x, this.y - game.camera.y, this.width, this.height);

                ctx.fillStyle = '#ff0000';
                ctx.fillRect(this.x - game.camera.x - 5, this.y - game.camera.y - 15, this.width + 10, 8);
                ctx.fillStyle = '#00ff00';
                const healthBarWidth = (this.width + 10) * (this.health / this.maxHealth);
                ctx.fillRect(this.x - game.camera.x - 5, this.y - game.camera.y - 15, healthBarWidth, 8);
            }

            takeDamage(amount) {
                this.health -= amount;
                if (this.health <= 0) {
                    this.active = false;
                }
            }
        }

        // Projectile class
        class Projectile {
            constructor(x, y, vx, vy, damage, isEnemyProjectile = false) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.damage = damage;
                this.size = 6;
                this.isEnemyProjectile = isEnemyProjectile;
                this.lifetime = 300;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.lifetime--;

                if (!this.isEnemyProjectile) {
                    for (let enemy of game.enemies) {
                        if (this.collidesWith(enemy)) {
                            enemy.takeDamage(this.damage);
                            this.lifetime = 0;
                        }
                    }
                    if (game.boss && game.boss.active && this.collidesWith(game.boss)) {
                        game.boss.takeDamage(this.damage);
                        this.lifetime = 0;
                    }
                } else {
                    if (this.collidesWith(game.player)) {
                        game.player.takeDamage(this.damage);
                        this.lifetime = 0;
                    }
                }
            }

            collidesWith(obj) {
                return Math.abs(this.x - (obj.x + obj.width/2)) < this.size + obj.width/2 &&
                       Math.abs(this.y - (obj.y + obj.height/2)) < this.size + obj.height/2;
            }

            draw(ctx) {
                ctx.fillStyle = this.isEnemyProjectile ? '#ff00ff' : '#ffff00';
                ctx.fillRect(this.x - game.camera.x, this.y - game.camera.y, this.size, this.size);
            }
        }

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') {
                e.preventDefault();
                game.player.shoot();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        canvas.addEventListener('click', () => {
            game.player.melee();
        });

        function handleInput() {
            game.player.vx = 0;
            game.player.vy = 0;

            const dirs = {
                'w': [0, -1], 'arrowup': [0, -1],
                's': [0, 1], 'arrowdown': [0, 1],
                'a': [-1, 0], 'arrowleft': [-1, 0],
                'd': [1, 0], 'arrowright': [1, 0]
            };

            for (let key in dirs) {
                if (keys[key]) {
                    game.player.vx += dirs[key][0] * game.player.speed;
                    game.player.vy += dirs[key][1] * game.player.speed;
                    if (dirs[key][1] === -1) game.player.direction = 1;
                    else if (dirs[key][1] === 1) game.player.direction = 0;
                    else if (dirs[key][0] === -1) game.player.direction = 2;
                    else if (dirs[key][0] === 1) game.player.direction = 3;
                }
            }
        }

        function spawnBoss() {
            game.boss = new Boss(WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
        }

        function update() {
            game.gameTime++;
            handleInput();

            game.player.update();

            if (game.enemies.length < 5 + game.wave * 2 && Math.random() < game.enemySpawnRate) {
                const spawnX = Math.random() * WORLD_WIDTH;
                const spawnY = Math.random() * WORLD_HEIGHT;
                const type = Math.random() < 0.2 ? 'strong' : 'normal';
                game.enemies.push(new Enemy(spawnX, spawnY, type));
            }

            if (game.wave === 5 && !game.boss) {
                spawnBoss();
            }

            for (let i = game.enemies.length - 1; i >= 0; i--) {
                game.enemies[i].update();
                if (game.enemies[i].health <= 0) {
                    game.enemies.splice(i, 1);
                    game.wave += 0.1;
                    game.enemySpawnRate += 0.001;
                }
            }

            if (game.boss) {
                game.boss.update();
            }

            for (let i = game.projectiles.length - 1; i >= 0; i--) {
                game.projectiles[i].update();
                if (game.projectiles[i].lifetime <= 0) {
                    game.projectiles.splice(i, 1);
                }
            }

            for (let i = game.attacks.length - 1; i >= 0; i--) {
                game.attacks[i].update();
                if (game.attacks[i].lifetime <= 0) {
                    game.attacks.splice(i, 1);
                }
            }

            game.camera.x = game.player.x - canvas.width / 2;
            game.camera.y = game.player.y - canvas.height / 2;
            game.camera.x = Math.max(0, Math.min(game.camera.x, WORLD_WIDTH - canvas.width));
            game.camera.y = Math.max(0, Math.min(game.camera.y, WORLD_HEIGHT - canvas.height));

            document.getElementById('health').textContent = Math.max(0, Math.floor(game.player.health));
            document.getElementById('enemies').textContent = game.enemies.length;

            // Update ammo UI
            if (game.player.isReloading) {
                document.getElementById('reloadBar').style.display = 'block';
                const percent = Math.floor((game.player.reloadProgress / game.player.reloadTime) * 100);
                document.getElementById('reloadPercent').textContent = percent;
            } else {
                document.getElementById('reloadBar').style.display = 'none';
            }

            if (game.boss && game.boss.active) {
                document.getElementById('bossHealth').style.display = 'block';
                document.getElementById('bossHealthBar').textContent = Math.max(0, Math.floor(game.boss.health));
            } else {
                document.getElementById('bossHealth').style.display = 'none';
            }

            if (game.player.health <= 0) {
                alert(`Game Over! Wave: ${Math.floor(game.wave)}`);
                location.reload();
            }
        }

        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#222222';
            for (let x = Math.floor(game.camera.x / 32); x < Math.ceil((game.camera.x + canvas.width) / 32); x++) {
                for (let y = Math.floor(game.camera.y / 32); y < Math.ceil((game.camera.y + canvas.height) / 32); y++) {
                    if ((x + y) % 2 === 0) {
                        ctx.fillRect(x * 32 - game.camera.x, y * 32 - game.camera.y, 32, 32);
                    }
                }
            }

            for (let enemy of game.enemies) {
                enemy.draw(ctx);
            }

            if (game.boss) {
                game.boss.draw(ctx);
            }

            for (let projectile of game.projectiles) {
                projectile.draw(ctx);
            }

            for (let attack of game.attacks) {
                attack.draw(ctx);
            }

            game.player.draw(ctx);

            if (game.boss && !game.boss.active) {
                ctx.fillStyle = '#ffff00';
                ctx.font = '24px Arial';
                ctx.fillText('Boss Defeated!', canvas.width / 2 - 100, canvas.height / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        game.player = new Player(WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
        gameLoop();
    </script>
</body>
</html>
