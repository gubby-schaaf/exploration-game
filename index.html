<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exploration Game :3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas" width="1100" height="700"></canvas>

  <div id="ui">
    <div>Health: <span id="health">100</span>/100</div>
    <div>Enemies Killed: <span id="killed">0</span></div>
    <div>W/A/S/D or Arrow Keys move | Click melee | Space shoot | X shockwave</div>
  </div>

  <div id="ammo">Arrows: <span id="ammoCount">3</span>/3</div>
  <div id="special">Shockwave: <span id="shockStatus">READY</span></div>

  <div id="bossUi">
    <div>Boss: Giga Slime</div>
    <div class="barWrap"><div id="bossBar" class="barFill"></div></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
